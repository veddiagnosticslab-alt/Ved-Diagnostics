<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ved Diagnostics - Entry Form</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .form-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #0056b3; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        input[readonly] { background-color: #eee; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Patient Entry Form</h2>
    <form id="labForm">
        <div class="form-group">
            <label>Bill Date</label>
            <input type="text" id="billDate" name="billDate" readonly>
        </div>
        <div class="form-group">
            <label>Patient ID (Auto)</label>
            <input type="text" id="patientId" name="id" readonly>
        </div>
        <div class="form-group">
            <label>Patient Info</label>
            <input type="text" id="patientInfo" placeholder="e.g. JYOTI, 32Y, Female" required>
        </div>
        <div class="form-group">
            <label>Referral</label>
            <input type="text" id="referral" placeholder="e.g. DR. SELF">
        </div>
        <div class="form-group">
            <label>Tests</label>
            <input type="text" id="tests" placeholder="e.g. CBC, LFT" required>
        </div>
        <div class="form-group">
            <label>Amount (₹)</label>
            <input type="number" id="amount" required>
        </div>
        <button type="submit" id="submitBtn">Save Record</button>
    </form>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwpC17LX68j__KAh2T8SEzZUfno2ejodQ8U8MC6fG44CdpAoN9bvvCvI-zMaX2uxZedPg/exec";

    // Auto Fill Date and ID
    window.onload = function() {
        const today = new Date();
        document.getElementById('billDate').value = today.toLocaleDateString() + " " + today.toLocaleTimeString();
        document.getElementById('patientId').value = "VED" + Math.floor(Date.now() / 1000); // Unique ID logic
    };

    document.getElementById('labForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Saving...";
        btn.disabled = true;

        const formData = {
            billDate: document.getElementById('billDate').value,
            id: document.getElementById('patientId').value,
            patientInfo: document.getElementById('patientInfo').value,
            referral: document.getElementById('referral').value,
            tests: document.getElementById('tests').value,
            amount: document.getElementById('amount').value
        };

        fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(formData)
        })
        .then(res => res.json())
        .then(data => {
            alert("Record Saved Successfully!");
            location.reload(); // Refresh to generate new ID
        })
        .catch(err => {
            console.error(err);
            alert("Error saving record.");
            btn.disabled = false;
            btn.innerText = "Save Record";
        });
    });
</script>

</body>
</html>
