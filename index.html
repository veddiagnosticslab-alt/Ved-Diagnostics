<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
    .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #333; }
    
    /* Button Styles */
    .btn { background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-bottom: 20px; }
    .btn:hover { background-color: #0056b3; }
    .btn-submit { background-color: #28a745; width: 100%; margin-top: 10px; }
    .btn-submit:hover { background-color: #218838; }
    
    /* Form Styles */
    #formContainer { display: none; background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 30px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
    input[type="text"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    
    /* Table Styles */
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background-color: #007bff; color: white; }
    tr:hover { background-color: #f1f1f1; }
    .status-pending { color: #856404; background-color: #fff3cd; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
    
    #loader { display: none; text-align: center; margin: 20px 0; font-weight: bold; color: #007bff; }
  </style>
</head>
<body>

<div class="container">
  <h2>Lab Records Dashboard</h2>
  
  <button class="btn" onclick="toggleForm()">+ New Entry</button>
  
  <div id="formContainer">
    <form id="recordForm" onsubmit="handleFormSubmit(event)">
      <div class="form-group">
        <label>Patient Info (Name, Age, etc.):</label>
        <input type="text" name="patientInfo" required placeholder="e.g., Ramesh Kumar, 45, M">
      </div>
      <div class="form-group">
        <label>Referral (Doctor/Self):</label>
        <input type="text" name="referral" required placeholder="Dr. Sharma / Self">
      </div>
      <div class="form-group">
        <label>Tests (Comma separated):</label>
        <input type="text" name="tests" required placeholder="e.g., CBC, KFT, Blood Sugar">
      </div>
      <div class="form-group">
        <label>Amount (₹):</label>
        <input type="number" name="amount" required placeholder="500">
      </div>
      <button type="submit" class="btn btn-submit">Save Record</button>
    </form>
  </div>

  <div id="loader">Processing data... Please wait.</div>

  <table id="dataTable">
    <thead>
      <tr>
        <th>Bill Date</th>
        <th>ID</th>
        <th>Patient Info</th>
        <th>Referral</th>
        <th>Tests</th>
        <th>Amount</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      </tbody>
  </table>
</div>

<script>
  // Load data when page loads
  document.addEventListener('DOMContentLoaded', loadData);

  function toggleForm() {
    var form = document.getElementById("formContainer");
    if (form.style.display === "none" || form.style.display === "") {
      form.style.display = "block";
    } else {
      form.style.display = "none";
    }
  }

  function handleFormSubmit(event) {
    event.preventDefault();
    document.getElementById('loader').style.display = "block";
    
    var form = document.getElementById('recordForm');
    
    // Call Apps Script function
    google.script.run
      .withSuccessHandler(function(response) {
        form.reset();
        form.style.display = "none"; // Hide form after saving
        loadData(); // Reload table data
      })
      .processForm(form);
  }

  function loadData() {
    document.getElementById('loader').style.display = "block";
    google.script.run
      .withSuccessHandler(function(dataArray) {
        var tbody = document.getElementById('tableBody');
        tbody.innerHTML = ''; // Clear existing rows
        
        dataArray.forEach(function(row) {
          var tr = document.createElement('tr');
          
          // Row layout: Date, ID, Patient, Referral, Tests, Amount, Status
          row.forEach(function(cellData, index) {
            var td = document.createElement('td');
            
            // Apply styling for status column (index 6)
            if (index === 6) {
              td.innerHTML = '<span class="status-pending">' + cellData + '</span>';
            } else {
              td.textContent = cellData;
            }
            tr.appendChild(td);
          });
          
          tbody.appendChild(tr);
        });
        document.getElementById('loader').style.display = "none";
      })
      .getSheetData();
  }
</script>

</body>
</html>
